<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#f5f0e8"/>
  <!-- "A" in pixel art (5x5 grid, each pixel = 5 units, offset 4,4) -->
  <!-- Row 1: .XX. -->
  <rect x="9" y="4" width="5" height="5" fill="#2d2016"/>
  <rect x="14" y="4" width="5" height="5" fill="#2d2016"/>
  <!-- Row 2: X..X -->
  <rect x="4" y="9" width="5" height="5" fill="#2d2016"/>
  <rect x="19" y="9" width="5" height="5" fill="#2d2016"/>
  <!-- Row 3: XXXX -->
  <rect x="4" y="14" width="5" height="5" fill="#2d2016"/>
  <rect x="9" y="14" width="5" height="5" fill="#2d2016"/>
  <rect x="14" y="14" width="5" height="5" fill="#2d2016"/>
  <rect x="19" y="14" width="5" height="5" fill="#2d2016"/>
  <!-- Row 4: X..X -->
  <rect x="4" y="19" width="5" height="5" fill="#2d2016"/>
  <rect x="19" y="19" width="5" height="5" fill="#2d2016"/>
  <!-- Row 5: X..X -->
  <rect x="4" y="24" width="5" height="5" fill="#2d2016"/>
  <rect x="19" y="24" width="5" height="5" fill="#2d2016"/>
</svg>
